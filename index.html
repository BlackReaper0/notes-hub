<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Notes Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10;
    --surface: #18181c;
    --surface2: #202026;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --text: #f0efe8;
    --muted: #888780;
    --faint: #3a3a3f;

    --java:   #e85d2f;
    --python: #4a9eff;
    --js:     #f0b429;
    --react:  #38bdf8;
    --spring: #6abf69;
    --general:#9b8afb;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  .page { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 3rem 2rem 5rem; }

  /* ── header ── */
  header { margin-bottom: 3rem; }
  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 5vw, 3.25rem);
    font-weight: 300;
    line-height: 1.15;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  h1 em {
    font-style: italic;
    color: var(--java);
  }
  .subtitle {
    font-size: 13px;
    color: var(--muted);
    max-width: 420px;
  }

  /* ── toolbar ── */
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.35;
    pointer-events: none;
  }
  input[type="text"] {
    width: 100%;
    height: 40px;
    padding: 0 12px 0 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--border-hover); }
  input[type="text"]::placeholder { color: var(--muted); }

  .add-btn {
    height: 40px;
    padding: 0 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .add-btn:hover { border-color: var(--border-hover); background: var(--faint); }
  .add-btn svg { opacity: 0.7; }

  /* ── tag filters ── */
  .tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 2.5rem;
  }
  .tag-btn {
    height: 30px;
    padding: 0 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tag-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .tag-btn.active { color: var(--text); border-color: var(--text); background: rgba(255,255,255,0.05); }
  .tag-btn[data-tag="Java"].active     { border-color: var(--java);    color: var(--java); }
  .tag-btn[data-tag="Python"].active   { border-color: var(--python);  color: var(--python); }
  .tag-btn[data-tag="JavaScript"].active { border-color: var(--js);   color: var(--js); }
  .tag-btn[data-tag="React"].active    { border-color: var(--react);   color: var(--react); }
  .tag-btn[data-tag="Spring"].active   { border-color: var(--spring);  color: var(--spring); }
  .tag-btn[data-tag="General"].active  { border-color: var(--general); color: var(--general); }

  /* ── sections ── */
  .section + .section { margin-top: 2.5rem; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
  }
  .lang-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .section-count {
    font-size: 11px;
    color: var(--faint);
    margin-left: auto;
  }
  .divider {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
    gap: 12px;
  }

  /* ── card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    text-decoration: none;
    display: block;
    transition: border-color 0.2s, transform 0.15s, background 0.2s;
    animation: fadeUp 0.35s ease both;
  }
  .card:hover {
    border-color: var(--border-hover);
    background: var(--surface2);
    transform: translateY(-2px);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-thumb {
    height: 88px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    position: relative;
    overflow: hidden;
  }
  .card-thumb::after {
    content: '';
    position: absolute;
    inset: 0;
    background: inherit;
    opacity: 0.06;
  }
  .card-body {
    padding: 11px 13px 13px;
    border-top: 1px solid var(--border);
  }
  .card-title {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.35;
  }
  .card-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 10px;
  }
  .card-badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.05em;
    padding: 2px 8px;
    border-radius: 99px;
    border: 1px solid;
  }

  /* colour themes per language */
  .theme-java     { --c: var(--java); }
  .theme-python   { --c: var(--python); }
  .theme-js       { --c: var(--js); }
  .theme-react    { --c: var(--react); }
  .theme-spring   { --c: var(--spring); }
  .theme-general  { --c: var(--general); }

  .card-thumb { background: color-mix(in srgb, var(--c) 12%, var(--surface)); }
  .lang-dot   { background: var(--c); }
  .card-badge { color: var(--c); border-color: color-mix(in srgb, var(--c) 40%, transparent); }

  /* ── empty ── */
  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-size: 13px;
  }
  .empty-icon { font-size: 2rem; margin-bottom: 0.75rem; opacity: 0.4; }

  /* ── modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border-hover);
    border-radius: 14px;
    padding: 1.5rem;
    width: 340px;
    max-width: calc(100vw - 2rem);
    animation: popIn 0.2s ease;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.95) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal h2 {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 1.25rem;
  }
  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .field input, .field select {
    width: 100%;
    height: 36px;
    padding: 0 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12.5px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus { border-color: var(--border-hover); }
  .field input::placeholder { color: var(--faint); }
  .field select option { background: var(--surface2); }

  .row { display: flex; gap: 10px; }
  .row .field { flex: 1; }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 1.25rem;
    justify-content: flex-end;
  }
  .btn-cancel {
    height: 36px;
    padding: 0 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .btn-cancel:hover { border-color: var(--border-hover); color: var(--text); }
  .btn-add {
    height: 36px;
    padding: 0 18px;
    background: var(--text);
    border: none;
    border-radius: 7px;
    color: var(--bg);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-add:hover { opacity: 0.85; }

  /* ── footer ── */
  footer {
    margin-top: 4rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--faint);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #page-count { transition: color 0.3s; }
</style>
</head>
<body>
<div class="page">

  <header>
    <p class="eyebrow">// personal knowledge base</p>
    <h1>My <em>notes</em> hub</h1>
    <p class="subtitle">Prg Languages, Frameworks, and everything in between — one place to find it all.</p>
  </header>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="Search topics..." oninput="render()" />
    </div>
    <button class="add-btn" onclick="openModal()">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Add page
    </button>
  </div>

  <div class="tags" id="tags"></div>
  <div id="content"></div>

</div>

<!-- modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2>Add a page</h2>
    <div class="field">
      <label>Topic title</label>
      <input id="m-title" placeholder="e.g. Interfaces" />
    </div>
    <div class="field">
      <label>Short description</label>
      <input id="m-desc" placeholder="What does this cover?" />
    </div>
    <div class="field">
      <label>Notion URL</label>
      <input id="m-url" placeholder="https://notion.so/..." />
    </div>
    <div class="row">
      <div class="field">
        <label>Language / Framework</label>
        <input id="m-tag" list="tag-suggestions" placeholder="Java, React…" />
        <datalist id="tag-suggestions"></datalist>
      </div>
      <div class="field" style="max-width:80px">
        <label>Icon</label>
        <input id="m-emoji" placeholder="📄" maxlength="2" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-add" onclick="savePage()">Add page</button>
    </div>
  </div>
</div>

<script>
const LANG_THEME = {
  'Java': 'theme-java',
  'Python': 'theme-python',
  'JavaScript': 'theme-js',
  'React': 'theme-react',
  'Spring': 'theme-spring',
  'General': 'theme-general',
};
const FALLBACK_THEMES = ['theme-general','theme-python','theme-react','theme-spring'];

let pages = [
  { id:1,  title:'Inheritance',          desc:'extends, super, method overriding',      url:'https://scalloped-crowd-1d5.notion.site/3-Pillars-of-OOP-Inheritance-23ef9b155b4080aa87a1ce5317fd5a17', tag:'Java',    emoji:'🌳' },
  { id:2,  title:'Abstraction',          desc:'Abstract classes and interfaces',        url:'https://scalloped-crowd-1d5.notion.site/Pillar-of-OOP-Abstraction-242f9b155b40809daf84d34c4627fc07', tag:'Java',    emoji:'🎭' },
  { id:3,  title:'Encapsulation',        desc:'Access modifiers, getters & setters',    url:'https://scalloped-crowd-1d5.notion.site/Pillars-Of-OOP-Encapsulation-242f9b155b40804ab13edf6eca717cfc', tag:'Java',    emoji:'🔒' },
  { id:4,  title:'Polymorphism',         desc:'Overloading, overriding, casting',       url:'https://scalloped-crowd-1d5.notion.site/Pillars-Of-OOP-Polymorphism-242f9b155b4080948926cc7483e55dcd?pvs=73', tag:'Java',    emoji:'🔄' },
  { id:5,  title:'Access Control',          desc:'Public, Private, Protected',           url:'https://scalloped-crowd-1d5.notion.site/Access-Control-242f9b155b40801cacd6fbf8e151ef32', tag:'Java',    emoji:'📦' },
  { id:6,  title:'Interfaces',   desc:'Types, Methods',    url:'https://scalloped-crowd-1d5.notion.site/Interfaces-243f9b155b4080b3a3b4c6cc4cdc2665?pvs=73', tag:'Java',    emoji:'⚠️' },
  { id:7,  title:'Generics',             desc:'Type parameters and bounded types',      url:'https://scalloped-crowd-1d5.notion.site/Generics-243f9b155b408068a170dd6a46034021', tag:'Java',    emoji:'🧩' },
];

let nextId = 9;
let activeTag = 'All';

function themeFor(tag) {
  return LANG_THEME[tag] || FALLBACK_THEMES[Object.keys(LANG_THEME).length % FALLBACK_THEMES.length];
}

function allTags() {
  return ['All', ...[...new Set(pages.map(p => p.tag))]];
}

function setTag(t) {
  activeTag = t;
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();

  // tags
  document.getElementById('tags').innerHTML = allTags().map(t =>
    `<button class="tag-btn${activeTag===t?' active':''}" data-tag="${t}" onclick="setTag('${t}')">${t === 'All' ? 'All topics' : t}</button>`
  ).join('');

  // filter
  const filtered = pages.filter(p =>
    (activeTag === 'All' || p.tag === activeTag) &&
    (p.title.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q) || p.tag.toLowerCase().includes(q))
  );

  if (!filtered.length) {
    document.getElementById('content').innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        No pages match your search.
      </div>`;
    updateCount(0);
    return;
  }

  // group
  const groups = {};
  filtered.forEach(p => { (groups[p.tag] = groups[p.tag] || []).push(p); });

  let delay = 0;
  document.getElementById('content').innerHTML = Object.entries(groups).map(([tag, items]) => {
    const theme = themeFor(tag);
    const cards = items.map(p => {
      const d = delay;
      delay += 40;
      return `
        <a class="card ${theme}" href="${p.url}" target="_blank" rel="noopener" style="animation-delay:${d}ms">
          <div class="card-thumb">${p.emoji}</div>
          <div class="card-body">
            <div class="card-title">${p.title}</div>
            <div class="card-desc">${p.desc}</div>
            <span class="card-badge">${p.tag}</span>
          </div>
        </a>`;
    }).join('');

    return `
      <div class="section">
        <div class="section-header">
          <span class="lang-dot ${theme}"></span>
          <span class="section-title">${tag}</span>
          <span class="divider"></span>
          <span class="section-count">${items.length} page${items.length!==1?'s':''}</span>
        </div>
        <div class="grid">${cards}</div>
      </div>`;
  }).join('');

  updateCount(filtered.length);
}

function updateCount(n) {
  const el = document.getElementById('page-count');
  if (el) el.textContent = `${n} page${n !== 1 ? 's' : ''}`;
}

function openModal() {
  const tags = [...new Set(pages.map(p => p.tag))];
  document.getElementById('tag-suggestions').innerHTML = tags.map(t => `<option value="${t}">`).join('');
  ['m-title','m-desc','m-url','m-tag','m-emoji'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function savePage() {
  const title = document.getElementById('m-title').value.trim();
  const url   = document.getElementById('m-url').value.trim();
  if (!title) { alert('Please enter a title.'); return; }
  if (!url)   { alert('Please enter the Notion URL.'); return; }
  pages.push({
    id: nextId++,
    title,
    desc:  document.getElementById('m-desc').value.trim() || '',
    url,
    tag:   document.getElementById('m-tag').value.trim() || 'General',
    emoji: document.getElementById('m-emoji').value.trim() || '📄',
  });
  closeModal();
  activeTag = 'All';
  render();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

render();

// footer
document.querySelector('.page').insertAdjacentHTML('beforeend', `
  <footer>
    <span>// Rohan Chopade</span>
    <span id="page-count"></span>
  </footer>`);
updateCount(pages.length);
</script>
</body>
</html>
